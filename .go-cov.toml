# go-cov gates its own repository. See README for all keys.
#
# These thresholds are a RATCHET FLOOR: they sit just below current coverage so
# the gate stays green today while preventing regressions. Raise them as tests
# are added — the big gaps are the AST analysis (ast_analysis.go) and the
# subprocess-driven runner (run.go), which is integration-level and largely
# unit-untestable.

project = "go-cov"

[thresholds]
total = 55    # ratchet floor; actual ~65% once excludes apply — raise as coverage grows
package = 55  # ratchet floor; actual ~65% for internal/coverage after excludes
function = 0  # per-function gate disabled for now (AST analysis not yet covered)
print = 80    # still list functions below 80% in the report, informationally

[test]
race = true
timeout = "5m"

[exclude]
# Integration-level code that drives `go test` / `go tool cover` subprocesses and
# the CLI entrypoint. It is exercised end-to-end, not by unit tests. Excluding it
# removes these from every coverage dimension — total, per-package, per-function,
# and the uncovered-block report — so the gate measures only unit-testable code.
files = ["run.go", "cmd/"]

[critical_blocks]
fail = false  # remaining uncovered CRITICAL blocks (AST analysis) are known debt; don't fail CI yet
